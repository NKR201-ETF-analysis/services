# Docker Swarm 部署方式：docker stack deploy -c superset.yml superset
# 需先建立 overlay 網路：docker network create -d overlay my_swarm_network
#
# 教學精簡版：使用官方 apache/superset 映像，metadata 採用映像內建的 SQLite
# （存放於 superset_home volume，免裝 MySQL driver、免客製映像、免預建資料庫）
#
# 單一服務設計：啟動時「先初始化、再啟動 web server」，依序執行避免
# 多個程序同時寫入 SQLite 造成 database is locked。
# Swarm 模式不支援 build / container_name，並改用 deploy 區塊控制副本與部署節點。
#
version: '3'  # 指定 docker-compose 檔案版本（3 以上支援 Swarm 部署）

services:

  superset:
    image: apache/superset:4.1.4  # 官方 superset 映像檔（pinned 穩定版）
    user: "root"  # 以 root 執行，避免 volume 權限問題
    environment:
      SUPERSET_SECRET_KEY: 'CHANGE_ME_TO_A_RANDOM_SECRET'  # 安全金鑰，正式環境請改成隨機字串
      FLASK_ENV: development      # Flask 執行環境
      SUPERSET_ENV: development   # Superset 執行環境
      SUPERSET_PORT: 8088         # Superset 服務埠
    command: >
      sh -c "pip install --no-cache-dir PyMySQL &&
      superset db upgrade &&
      superset fab create-admin
      --username admin --firstname Superset --lastname Admin
      --email admin@superset.com --password admin || true &&
      superset init &&
      /usr/bin/run-server.sh"
      # 依序執行（避免 SQLite 鎖衝突）：
      # 0. pip install PyMySQL：補上 MySQL driver（官方映像未內建），
      #    讓 "Connect a database" 清單出現 MySQL；PyMySQL 為純 Python 免編譯
      # 1. db upgrade：建立 / 升級 metadata 資料表
      # 2. create-admin：建立預設管理者 admin / admin（已存在則略過，故加 || true）
      # 3. init：初始化角色與權限
      # 4. run-server.sh：官方內建啟動腳本，以 gunicorn 啟動 web
    ports:
      - 8088:8088  # 對外開放 superset Web 介面（http://localhost:8088）
    volumes:
      - superset_home:/app/superset_home  # 家目錄，SQLite 資料庫(superset.db)也存在這
    networks:
      - my_swarm_network  # 加入 overlay 網路（與其他服務一致）
    deploy:
      mode: replicated  # replicated 模式
      replicas: 1       # SQLite 為單機單檔，固定 1 個副本
      placement:
        constraints: [node.role==manager]  # 部署於 manager 節點
      restart_policy:
        condition: on-failure  # 失敗時自動重啟

networks:
  my_swarm_network:
    external: true  # 使用外部已建立的 overlay 網路（需事先 docker network create）

volumes:
  superset_home:
    external: false  # 交由 stack 自動建立即可（內含 SQLite metadata）
